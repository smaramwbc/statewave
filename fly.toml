app = 'statewave-api'
primary_region = 'ord'

[build]

[env]
  PORT = "8100"
  STATEWAVE_COMPILER_TYPE = "llm"
  STATEWAVE_LLM_COMPILER_MODEL = "gpt-4o-mini"
  STATEWAVE_EMBEDDING_PROVIDER = "openai"
  STATEWAVE_OPENAI_EMBEDDING_MODEL = "text-embedding-3-small"
  STATEWAVE_EMBEDDING_DIMENSIONS = "1536"

[http_service]
  internal_port = 8100
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
